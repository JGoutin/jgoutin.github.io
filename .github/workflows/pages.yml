---
# Build the Zensical site (English + French) and deploy it to GitHub Pages.
#
# The whole build is orchestrated by ``docs_hooks/build.py`` so that this
# workflow stays minimal and easy to read.

name: Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          activate-environment: true

      - name: Install dependencies
        run: uv sync --frozen --group docs

      - name: Build site (Zensical + CV PDFs)
        run: uv run python -m docs_hooks.build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
