[project]
site_name = "JGoutin-dev"
site_description = "Solutions logicielles d'entreprise pour la transformation cloud AWS - Conseil expert, DevOps et applications IA"
site_author = "Jérémy Goutin"
site_url = "https://jgoutin.dev/fr/"
copyright = "JGoutin-dev SARL - 994495422 R.C.S. Aix-en-Provence, France &middot; &copy; Tous droits réservés."

docs_dir = "docs/fr"
site_dir = "site/fr"

extra_css = ["../assets/stylesheets/extra.css"]

nav = [
    { "Accueil" = "index.md" },
    { "Services" = [
        "services.md",
        "projects.md",
        "resume.md"
    ]},
    { "Produits" = "products.md" },
    { "Contact" = [
        "contact.md",
        "legal.md",
        "privacy.md",
    ]},
]

[project.theme]
language = "fr"
logo = "../assets/jgoutin-dev.svg"
favicon = "../assets/logo.svg"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.top",
    "navigation.footer",
    "navigation.sections",
    "navigation.indexes",
    "search.highlight",
    "content.code.copy",
    "content.tooltips",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Basculer en mode clair"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Basculer en mode sombre"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon-star"
toggle.name = "Suivre les préférences du système"

[project.extra]
generator = false
og_image = "../assets/og-image.png"
og_site_name = "JGoutin-dev"
twitter_card = { site = "@jgoutin", creator = "@jgoutin" }
alternate = [
    { name = "English", link = "/en/", lang = "en" },
    { name = "Français", link = "/fr/", lang = "fr" },
]

[[project.extra.social]]
icon = "fontawesome/brands/aws"
link = "https://aws.amazon.com/marketplace/seller-profile?id=seller-ccb2g3cgwed2y"
name = "AWS Marketplace"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/jgoutin"
name = "GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/jgoutin"
name = "LinkedIn"

[[project.extra.social]]
icon = "fontawesome/solid/envelope"
link = "mailto:contact@jgoutin.dev"
name = "Email"

[project.plugins.sitemap]
hostname = "https://jgoutin.dev"
exclude = ["_root/*"]

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]