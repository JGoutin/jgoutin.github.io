<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JGoutin-dev</title>
<link rel="canonical" href="https://jgoutin.dev/en/">
<link rel="alternate" hreflang="en" href="https://jgoutin.dev/en/">
<link rel="alternate" hreflang="fr" href="https://jgoutin.dev/fr/">
<link rel="alternate" hreflang="x-default" href="https://jgoutin.dev/en/">
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=en/">
<script>
  (function () {
    var lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
    var target = lang.indexOf("fr") === 0 ? "fr/" : "en/";
    location.replace(target);
  })();
</script>
</head>
<body>
<p>Redirecting to <a href="en/">English</a> / <a href="fr/">Français</a>&hellip;</p>
</body>
</html>
